# ABOUTME: Iosevka build plan for Fzfira Code — fzfLAUNCHER's bundled monospace font.
# ABOUTME: Run `make build-fonts` to build TTFs into this directory.
#
# Based on IosevkaTerm (spacing = "term", strictly fixed-pitch) with
# IosevkaCustom design variants (slashed zero, hooky i, etc.).
# Renamed to "Fzfira Code" to avoid collision with users' own Iosevka builds.

[buildPlans.FzfiraCode]
family = "Fzfira Code"
spacing = "term"
serifs = "sans"
noCvSs = true
exportGlyphNames = true

[buildPlans.FzfiraCode.variants.design]
one = "no-base"
four = "open-serifless"
seven = "straight-serifless-crossbar"
zero = "slashed"
capital-g = "toothless-rounded-serifless-hooked"
capital-j = "serifless"
capital-q = "vertical-crossing"
capital-z = "straight-serifless-with-horizontal-crossbar"
a = "single-storey-serifless"
f = "serifless"
i = "hooky"
j = "serifless"
k = "curly-serifless"
l = "semi-tailed"
m = "serifless"
q = "diagonal-tailed-serifless"
t = "bent-hook"

[buildPlans.FzfiraCode.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.FzfiraCode.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.FzfiraCode.widths.Normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.FzfiraCode.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"
